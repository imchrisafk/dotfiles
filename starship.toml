# Starship configuration file
# ~/.config/starship.toml

# Set the format of the prompt
format = """
[╭─](bold green)$username$directory$git_branch$git_state$git_status$python$rust$cmd_duration$battery
[╰─$character](bold green)"""

# Disable the blank line at the start of the prompt
add_newline = true

# Username module
[username]
show_always = true
style_user = "blue bold"
style_root = "red bold"
format = "[$user]($style):"

# Directory module
[directory]
truncation_length = 3
truncate_to_repo = true
style = "cyan bold"
format = "[$path]($style) "

# Git branch module
[git_branch]
style = "purple"
format = "[$symbol$branch]($style) "

# Git status module
[git_status]
style = "red"
format = "[$all_status$ahead_behind]($style) "
conflicted = "⚔️ "
ahead = "🚀 "
behind = "🐢 "
diverged = "🔀 "
untracked = "📂 "
stashed = "📦 "
modified = "📝 "
staged = "✅ "
renamed = "🔄 "
deleted = "🗑️ "

# Python: Bright yellow with snake emoji
[python]
style = "bright_yellow bold"
format = "[🐍 $version](bold bright_yellow) "
detect_extensions = ["py"]
detect_files = [".python-version", "Pipfile", "requirements.txt", "pyproject.toml"]

# Rust: Red with crab emoji
[rust]
style = "red bold"
format = "[🦀 $version](bold red) "
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]

# Command duration module
[cmd_duration]
min_time = 500
style = "yellow"
format = "took [$duration]($style)"

# Battery: Bright green for battery status
[battery]
full_symbol = "🔋 "
charging_symbol = "⚡️ "
discharging_symbol = "🔌 "
format = "[$symbol$percentage](bold bright_green) "

# Character: Success/error symbols with ANSI colors
[character]
success_symbol = "[➤](bold green)"
error_symbol = "[➤](bold red)"
vicmd_symbol = "[V](bold magenta)"  # For vi-mode in Bash/Zsh
